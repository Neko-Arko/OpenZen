name: Build Forge Mod

on:
  workflow_dispatch:

jobs:
  build-jar:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - run: chmod +x gradlew
    - run: ./gradlew jar reobfJar --no-daemon
    - uses: actions/upload-artifact@v4
      with:
        name: OpenZen-Mod
        path: build/libs/*.jar
